<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circlo</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
    color: white;
    text-align: center;
  }

  h1 {
    margin-top: 15px;
  }

  canvas {
    background: white;
    border-radius: 12px;
    margin-top: 15px;
    touch-action: none;
  }

  .container {
    max-width: 500px;
    margin: auto;
    padding: 10px;
  }

  .score {
    font-size: 28px;
    margin: 10px 0;
  }

  .best {
    color: #00ffcc;
  }

  button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #00ffcc;
    font-weight: bold;
    margin-top: 10px;
  }
</style>
</head>

<body>

<div class="container">
  <h1>🎯 Circlo</h1>
  <canvas id="canvas"></canvas>

  <div class="score" id="result">0%</div>
  <div class="best" id="bestScore">Melhor: 0%</div>

  <button onclick="resetCanvas()">Tentar novamente</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// RESPONSIVO
function resizeCanvas() {
  const size = Math.min(window.innerWidth * 0.9, 400);
  canvas.width = size;
  canvas.height = size;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let drawing = false;
let points = [];

let best = localStorage.getItem("bestScore") || 0;
document.getElementById("bestScore").innerText = "Melhor: " + best + "%";

function startDraw(e) {
  drawing = true;
  points = [];
  ctx.beginPath();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function endDraw() {
  drawing = false;
  calculateCircle();
}

function draw(x, y) {
  if (!drawing) return;
  points.push({ x, y });
  ctx.lineWidth = 2;
  ctx.lineTo(x, y);
  ctx.stroke();
}

// MOUSE
canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mouseup", endDraw);
canvas.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();
  draw(e.clientX - rect.left, e.clientY - rect.top);
});

// TOUCH (CELULAR 🔥)
canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  startDraw();
});

canvas.addEventListener("touchend", (e) => {
  e.preventDefault();
  endDraw();
});

canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  draw(touch.clientX - rect.left, touch.clientY - rect.top);
});

function calculateCircle() {
  if (points.length < 10) return;

  let centerX = 0, centerY = 0;

  points.forEach(p => {
    centerX += p.x;
    centerY += p.y;
  });

  centerX /= points.length;
  centerY /= points.length;

  let distances = points.map(p =>
    Math.hypot(p.x - centerX, p.y - centerY)
  );

  let avg = distances.reduce((a, b) => a + b) / distances.length;

  let variance = distances.reduce((sum, d) =>
    sum + Math.pow(d - avg, 2), 0) / distances.length;

  let stdDev = Math.sqrt(variance);

  let score = Math.max(0, 100 - stdDev * 2);
  score = Math.min(100, score);
  score = score.toFixed(2);

  document.getElementById("result").innerText = score + "%";

  if (score > best) {
    best = score;
    localStorage.setItem("bestScore", best);
    document.getElementById("bestScore").innerText = "Melhor: " + best + "%";
  }
}

function resetCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById("result").innerText = "0%";
}
</script>

</body>
</html>
